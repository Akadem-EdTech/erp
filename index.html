<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ERP AKADEM · Gestión Integral</title>

<!-- Firebase Compat (NO ES modules — lección GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#E8490F; --orange-deep:#B83609; --orange-soft:#FCEAE3; --orange-dark:#c93d0c;
  --navy:#2D3142; --navy-soft:#4A4F66; --navy-line:#E3E2DD; --navy-deep:#23262F;
  --light:#F8F7F4; --white:#FFFFFF; --ink:#2D3142; --muted:#7A7E8C; --border:#e7e4dd;
  --green:#1F9D6B; --green-soft:#E4F4EC; --amber:#E0A106; --amber-soft:#FBF1D8;
  --red:#D6453A; --red-soft:#FBE6E4; --blue:#2563EB; --blue-soft:#E5EDFB;
  --purple:#7C3AED; --purple-soft:#EDE7FB;
  --row-hover:#FAFAF8; --shadow:0 1px 3px rgba(45,49,66,.07),0 6px 22px rgba(45,49,66,.06);
  --shadow-lg:0 24px 60px rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--light);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}
h1,h2,h3,h4,.fh{font-family:'Plus Jakarta Sans',sans-serif}
.mono{font-family:'DM Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d8d6cf;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- LOGIN GATE ---------- */
#gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-deep) 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.gate-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:410px;padding:42px 38px}
.gate-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.gate-brand .bn{font-family:'Plus Jakarta Sans';font-weight:800;font-size:22px;letter-spacing:-.3px}
.gate-brand .aka{color:var(--orange)} .gate-brand .dem{color:var(--navy)} .gate-brand .erp{color:var(--muted);font-weight:600;font-size:17px}
.gate-h{font-size:15px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:12.5px;font-weight:600;color:var(--navy-soft);margin-bottom:6px}
.fld input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;transition:border .15s,box-shadow .15s;outline:none}
.fld input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
.btn-primary{width:100%;background:var(--orange);color:#fff;font-weight:700;padding:13px;border-radius:10px;font-size:15px;transition:background .15s;font-family:'Plus Jakarta Sans'}
.btn-primary:hover{background:var(--orange-deep)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.gate-err{background:var(--red-soft);color:var(--red);font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:16px;display:none}
.gate-foot{margin-top:22px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
.gate-mode{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
.gate-mode a{color:var(--orange);font-weight:600;cursor:pointer;text-decoration:none}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:236px;background:var(--navy);color:#fff;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb-brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .bn{font-family:'Plus Jakarta Sans';font-weight:800;font-size:18px;letter-spacing:-.3px}
.sb-brand .aka{color:var(--orange)} .sb-brand .dem{color:#fff} .sb-brand .erp{color:rgba(255,255,255,.5);font-weight:600;font-size:14px;margin-left:2px}
.sb-nav{padding:12px 10px;flex:1}
.sb-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4);font-weight:700;padding:14px 12px 6px}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,.78);font-weight:500;font-size:14px;cursor:pointer;transition:background .12s,color .12s;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:var(--orange);color:#fff;font-weight:600}
.sb-item svg{width:18px;height:18px;flex-shrink:0;stroke-width:2}
.sb-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:12px}
.sb-user{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;font-family:'Plus Jakarta Sans'}
.sb-uname{font-weight:600;font-size:13px;line-height:1.2;color:#fff}
.sb-urole{font-size:11px;color:rgba(255,255,255,.5)}
.sb-logout{width:100%;background:rgba(255,255,255,.08);color:#fff;padding:8px;border-radius:8px;font-size:13px;font-weight:600;transition:background .12s}
.sb-logout:hover{background:rgba(255,255,255,.15)}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:40}
.tb-title{font-family:'Plus Jakarta Sans';font-weight:800;font-size:21px;letter-spacing:-.4px}
.tb-sub{font-size:13px;color:var(--muted);margin-top:1px}
.tb-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.content{padding:26px 28px;flex:1}
.mobile-menu{display:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-weight:600;font-size:13.5px;transition:all .14s;border:1.5px solid transparent;white-space:nowrap}
.btn svg{width:16px;height:16px;stroke-width:2}
.btn-o{background:var(--orange);color:#fff} .btn-o:hover{background:var(--orange-deep)}
.btn-ghost{background:var(--white);color:var(--navy);border-color:var(--border)} .btn-ghost:hover{border-color:var(--navy-soft);background:var(--light)}
.btn-soft{background:var(--orange-soft);color:var(--orange-deep)} .btn-soft:hover{background:#f8ddd2}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-danger{background:var(--red-soft);color:var(--red)} .btn-danger:hover{background:#f6d3cf}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)}
.card-pad{padding:20px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.g4,.g3,.g2{grid-template-columns:1fr}}

/* KPI */
.kpi{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.kpi-label{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.kpi-val{font-family:'Plus Jakarta Sans';font-weight:800;font-size:27px;letter-spacing:-.6px;margin-top:7px;color:var(--navy)}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:3px}
.kpi-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-ic svg{width:18px;height:18px;stroke-width:2}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--white)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{background:var(--light);text-align:left;padding:11px 14px;font-weight:700;color:var(--navy-soft);font-size:12px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid #f0eee9;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--row-hover)}
.t-strong{font-weight:600;color:var(--navy)}
.t-mut{color:var(--muted)}
.num{font-variant-numeric:tabular-nums;text-align:right;font-family:'DM Mono',monospace}
.t-actions{display:flex;gap:5px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:var(--light);color:var(--navy-soft);transition:all .12s}
.icon-btn:hover{background:var(--orange-soft);color:var(--orange-deep)}
.icon-btn svg{width:15px;height:15px;stroke-width:2}
.icon-btn.del:hover{background:var(--red-soft);color:var(--red)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-soft);color:var(--green)} .b-amber{background:var(--amber-soft);color:var(--amber)}
.b-red{background:var(--red-soft);color:var(--red)} .b-blue{background:var(--blue-soft);color:var(--blue)}
.b-gray{background:#eceae4;color:var(--navy-soft)} .b-orange{background:var(--orange-soft);color:var(--orange-deep)}
.b-purple{background:var(--purple-soft);color:var(--purple)}

/* Forms */
.form-grid{display:grid;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.fg label{display:block;font-size:12.5px;font-weight:600;color:var(--navy-soft);margin-bottom:5px}
.fg label .req{color:var(--orange)}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;outline:none;transition:border .15s,box-shadow .15s;background:var(--white)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
.fg textarea{resize:vertical;min-height:70px}
.fg .hint{font-size:11.5px;color:var(--muted);margin-top:4px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(35,38,47,.55);backdrop-filter:blur(2px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:640px;animation:modalIn .2s ease}
.modal.wide{max-width:880px}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:18px;font-weight:800}
.modal-x{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--light);color:var(--navy-soft);transition:all .12s}
.modal-x:hover{background:var(--red-soft);color:var(--red)}
.modal-body{padding:24px;max-height:65vh;overflow-y:auto}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.tab{padding:9px 16px;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2.5px solid transparent;cursor:pointer;transition:all .12s;margin-bottom:-1px}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* Pipeline kanban */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:14px;overflow-x:auto;padding-bottom:8px}
.kcol{background:var(--light);border-radius:12px;padding:12px;min-height:200px}
.kcol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:2px 4px}
.kcol-title{font-weight:700;font-size:12.5px;font-family:'Plus Jakarta Sans'}
.kcol-count{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:1px 9px;font-size:11px;font-weight:700;color:var(--navy-soft)}
.kcard{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;cursor:grab;box-shadow:0 1px 2px rgba(45,49,66,.05);transition:box-shadow .12s,transform .12s}
.kcard:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.kcard.dragging{opacity:.5}
.kcol.dragover{outline:2px dashed var(--orange);outline-offset:-3px}
.kcard-client{font-weight:700;font-size:13.5px;color:var(--navy);margin-bottom:3px}
.kcard-meta{font-size:11.5px;color:var(--muted);margin-bottom:8px}
.kcard-amt{font-family:'DM Mono',monospace;font-weight:600;font-size:13px;color:var(--orange-deep)}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.prob-bar{height:4px;background:#eceae4;border-radius:3px;overflow:hidden;margin-top:7px}
.prob-fill{height:100%;background:var(--orange);border-radius:3px}

/* misc */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty svg{width:46px;height:46px;stroke-width:1.5;margin-bottom:12px;opacity:.5}
.empty h4{font-size:16px;color:var(--navy);margin-bottom:5px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--muted)}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-deep);color:#fff;padding:13px 22px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)} .toast.ok{background:var(--green)}
.pill-toggle{display:inline-flex;background:var(--light);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.pill-toggle button{padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);transition:all .12s}
.pill-toggle button.active{background:var(--white);color:var(--navy);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--light);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:600;color:var(--navy-soft)}
.sect-title{font-family:'Plus Jakarta Sans';font-weight:800;font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.divider{height:1px;background:var(--border);margin:20px 0}
.search-inp{position:relative}
.search-inp svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);stroke-width:2}
.search-inp input{padding-left:34px;width:240px;padding-top:8px;padding-bottom:8px;border:1.5px solid var(--border);border-radius:9px;outline:none;background:var(--white)}
.search-inp input:focus{border-color:var(--orange)}
.bar{height:8px;border-radius:5px;background:#eceae4;overflow:hidden}
.bar-fill{height:100%;border-radius:5px}
.mini-stat{display:flex;flex-direction:column;gap:2px}
.mini-stat .v{font-family:'DM Mono',monospace;font-weight:600;font-size:15px}
.mini-stat .l{font-size:11px;color:var(--muted)}
.read-only-hide{display:initial}
body.role-viewer .read-only-hide{display:none!important}

/* sync indicator */
.sync-ind{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);background:var(--light);border:1px solid var(--border);border-radius:20px;padding:4px 11px}
.sync-ind .sync-d{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 1s infinite}
.sync-ind.err{color:var(--red);background:var(--red-soft);border-color:#f3c9c4}
.sync-ind.err .sync-d{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* confirm detail box */
.conf-detail{background:var(--light);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:11px 13px;font-size:13px;color:var(--navy-soft);line-height:1.5}
.conf-detail.danger{border-left-color:var(--red);background:var(--red-soft);color:#9a2820}
.btn-danger-solid{background:var(--red);color:#fff}
.btn-danger-solid:hover{background:#bf3a30}
.btn-danger-solid:disabled{opacity:.45;cursor:not-allowed}

/* sortable th */
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--orange-deep)}
th.sortable .arr{opacity:.4;font-size:10px;margin-left:3px}
th.sortable.asc .arr,th.sortable.desc .arr{opacity:1;color:var(--orange)}

/* audit line */
.audit{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:2px}
.audit svg{width:12px;height:12px;stroke-width:2}

/* sidebar collapse (desktop) */
body.sb-collapsed .sidebar{width:64px}
body.sb-collapsed .sb-item span,body.sb-collapsed .sb-sec,body.sb-collapsed .sb-brand .bn,body.sb-collapsed .sb-user>div,body.sb-collapsed .sb-logout span{display:none}
body.sb-collapsed .sb-item{justify-content:center}
body.sb-collapsed .sb-brand{justify-content:center}
.sb-collapse-btn{position:absolute;top:18px;right:-11px;width:22px;height:22px;border-radius:50%;background:var(--white);border:1px solid var(--border);display:none;align-items:center;justify-content:center;color:var(--navy-soft);z-index:5;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.sb-collapse-btn svg{width:13px;height:13px;stroke-width:2.5;transition:transform .2s}
body.sb-collapsed .sb-collapse-btn svg{transform:rotate(180deg)}
@media(min-width:901px){.sb-collapse-btn{display:flex}}

/* tx tipo toggle */
.tx-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tx-opt{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);font-weight:600;font-size:14px;color:var(--muted);transition:all .14s}
.tx-opt svg{width:17px;height:17px}
.tx-opt:hover{border-color:var(--navy-soft)}
.tx-opt.active[data-v="ingreso"]{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.tx-opt.active[data-v="egreso"]{border-color:var(--red);background:var(--red-soft);color:var(--red)}

/* reportes */
.rep-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.rep-desc{font-size:12.5px;color:var(--muted);font-weight:400;max-width:560px;line-height:1.4}
.rep-alert{background:var(--red-soft);color:#9a2820;border-radius:8px;padding:10px 12px;font-size:12.5px;font-weight:600;margin-top:12px}
.funnel{display:flex;flex-direction:column;gap:8px}
.funnel-row{display:grid;grid-template-columns:130px 1fr 120px;align-items:center;gap:12px}
.funnel-label{font-size:13px;font-weight:600;color:var(--navy-soft)}
.funnel-bar{background:var(--light);border-radius:7px;height:30px;overflow:hidden}

/* =====================================================================

/* ---------- CONFIG FIREBASE ----------
   PROYECTO NUEVO: akadem-erp.
   Reemplazar con las credenciales reales cuando el proyecto esté creado.
   Mientras apiKey === "REEMPLAZAR", el sistema corre 100% en localStorage. */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA5FPUShOltrOGrNjdzoI3gl5BEAgrN0lU",
  authDomain: "akadem-erp.firebaseapp.com",
  projectId: "akadem-erp",

};

let db=null, auth=null, fbReady=false;
(function initFirebase(){

/* ---------- HELPERS FORMATO ---------- */
const fmt   = n => "$"+Math.round(Number(n)||0).toLocaleString('es-CL');
const fmtN  = n => (Math.round(Number(n)||0)).toLocaleString('es-CL');
const fmtPct= n => (Number(n)||0).toFixed(1)+"%";
const todayISO = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
function fmtFecha(iso){ if(!iso) return "—"; const d=new Date(iso); if(isNaN(d)) return iso;
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}); }
function mesNombre(m){ return ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][m]; }
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- VALIDACIÓN RUT (Chile) ---------- */
function cleanRut(r){ return String(r||"").replace(/[^0-9kK]/g,"").toUpperCase(); }
function validaRut(r){
  r=cleanRut(r); if(r.length<2) return false;
  const cuerpo=r.slice(0,-1), dv=r.slice(-1);
  if(!/^\d+$/.test(cuerpo)) return false;
  let s=0,m=2;
  for(let i=cuerpo.length-1;i>=0;i--){ s+=parseInt(cuerpo[i])*m; m=m===7?2:m+1; }
  const res=11-(s%11); const dvCalc=res===11?"0":res===10?"K":String(res);
  return dv===dvCalc;
}
function formatRut(r){
  r=cleanRut(r); if(r.length<2) return r;
  const cuerpo=r.slice(0,-1), dv=r.slice(-1);
  return cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g,".")+"-"+dv;
}

/* ---------- TOAST ---------- */
let toastT;
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className="toast show"+(type?" "+type:"");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

/* =====================================================================
   CAPA DE DATOS — COLECCIONES REALES
   Cada colección es un Map en memoria, sincronizado con Firestore
   (o localStorage en modo offline). Escrituras atómicas por documento.
   ===================================================================== */
const COLLECTIONS = ["empresas","personas","propuestas","proyectos","centros_costo",
  "ordenes_compra","hitos","transacciones","categorias_egreso","facturas","usuarios","contadores",
  "cuentas","mov_tesoreria"];

const Store = {
  data:{},           // { coleccion: { id: doc } }
  user:null,         // usuario actual {email, nombre, rol}
  _lsKey:"akadem_erp_v1",

  init(){ COLLECTIONS.forEach(c=>this.data[c]={}); },

  /* ---- carga inicial ---- */
  async loadAll(){
    if(fbReady && db){
      try{
        for(const c of COLLECTIONS){
          const snap=await db.collection(c).get();
          this.data[c]={};
          snap.forEach(doc=>{ this.data[c][doc.id]={id:doc.id,...doc.data()}; });
        }
        this._cacheToLS();
        return true;
      }catch(e){ console.warn("Error cargando Firestore, fallback LS:",e.message); }
    }
    this._loadFromLS();
    return false;
  },

  _cacheToLS(){ try{ localStorage.setItem(this._lsKey,JSON.stringify(this.data)); }catch(e){} },
  _loadFromLS(){
    try{ const raw=localStorage.getItem(this._lsKey);
      if(raw){ const d=JSON.parse(raw); COLLECTIONS.forEach(c=>this.data[c]=d[c]||{}); } }catch(e){}
  },

  all(col){ return Object.values(this.data[col]||{}); },
  get(col,id){ return (this.data[col]||{})[id]||null; },

  _syncPending:0,
  _syncErr:false,

  async set(col,doc){
    if(!doc.id) doc.id=uid();
    const now=nowISO();
    if(!doc.createdAt){ doc.createdAt=now; doc.createdBy=this.user?this.user.email:"system"; }
    doc.updatedAt=now;
    if(this.user) doc.updatedBy=this.user.email;
    this.data[col][doc.id]=doc;
    this._cacheToLS();
    if(fbReady && db){
      this._syncStart();
      try{ await db.collection(col).doc(doc.id).set(doc); this._syncOk(); }
      catch(e){ console.warn("Firestore set falló:",e.message); this._syncFail(); throw e; }
    }
    return doc;
  },

  async del(col,id){
    delete this.data[col][id];
    this._cacheToLS();
    if(fbReady && db){
      this._syncStart();
      try{ await db.collection(col).doc(id).delete(); this._syncOk(); }
      catch(e){ this._syncFail(); throw e; }
    }
  },

  _syncStart(){ this._syncPending++; this._renderSync(); },
  _syncOk(){ this._syncPending=Math.max(0,this._syncPending-1); this._syncErr=false; this._renderSync(); },
  _syncFail(){ this._syncPending=Math.max(0,this._syncPending-1); this._syncErr=true; this._renderSync(); },
  _renderSync(){
    const el=document.getElementById('syncDot'); if(!el) return;
    if(this._syncErr){ el.style.display='inline-flex'; el.className='sync-ind err'; el.innerHTML='<span class="sync-d"></span>Error al sincronizar'; return; }
    if(this._syncPending>0){ el.style.display='inline-flex'; el.className='sync-ind'; el.innerHTML='<span class="sync-d"></span>Sincronizando…'; }
    else{ el.style.display='none'; }
  },

  /* ---- contador secuencial para códigos de proyecto ---- */
  async nextSeq(clientCode){
    const key="seq_"+clientCode;
    let c=this.get("contadores",key);
    if(!c){ c={id:key,valor:0}; }
    c.valor=(c.valor||0)+1;
    await this.set("contadores",c);
    return String(c.valor).padStart(3,"0");
  }
};
Store.init();

/* ---------- código de proyecto AKD-[CLIENTE]-[TIPO]-[SEQ]-[MMAA] ---------- */
function clientCode(razon){
  return String(razon||"CLI").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Za-z]/g,"").toUpperCase().slice(0,4)||"CLI";
}
async function genProjectCode(razon,tipo){
  const cc=clientCode(razon);
  const seq=await Store.nextSeq(cc+tipo);
  const d=new Date(); const mmaa=String(d.getMonth()+1).padStart(2,"0")+String(d.getFullYear()).slice(-2);
  return `AKD-${cc}-${tipo}-${seq}-${mmaa}`;
}

/* =====================================================================
   AUTH
   ===================================================================== */
const Auth = {
  mode:"login",
  toggleMode(){
    this.mode=this.mode==="login"?"signup":"login";
    document.getElementById('loginBtn').textContent=this.mode==="login"?"Ingresar":"Crear cuenta";
    document.getElementById('modeHint').textContent=this.mode==="login"?"¿Primera vez? ":"¿Ya tienes cuenta? ";
    document.getElementById('modeToggle').textContent=this.mode==="login"?"Crear cuenta":"Ingresar";
  },
  err(m){ const e=document.getElementById('gateErr'); e.textContent=m; e.style.display="block"; },
  clearErr(){ document.getElementById('gateErr').style.display="none"; },

  async login(){
    this.clearErr();
    const email=document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass=document.getElementById('loginPass').value;
    if(!email||!pass){ this.err("Completa correo y contraseña"); return; }
    const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent="Procesando…";

    if(!fbReady){
      // modo offline: acepta cualquier credencial, rol admin local
      await this._enter({email,nombre:email.split('@')[0],rol:"admin"});
      btn.disabled=false; return;
    }
    try{
      if(this.mode==="signup"){
        await auth.createUserWithEmailAndPassword(email,pass);
      }else{
        await auth.signInWithEmailAndPassword(email,pass);
      }
      // onAuthStateChanged maneja la entrada
    }catch(e){
      this.err(this._msg(e.code)); btn.disabled=false;
      btn.textContent=this.mode==="login"?"Ingresar":"Crear cuenta";
    }
  },

  _msg(code){
    const m={
      'auth/invalid-email':'Correo inválido',
      'auth/user-not-found':'Usuario no encontrado. ¿Crear cuenta?',
      'auth/wrong-password':'Contraseña incorrecta',
      'auth/invalid-credential':'Credenciales inválidas',
      'auth/email-already-in-use':'Ese correo ya está registrado. Inicia sesión.',
      'auth/weak-password':'La contraseña debe tener al menos 6 caracteres'
    };
    return m[code]||'Error de autenticación';
  },

  async _enter(userObj){
    await Store.loadAll();
    // resolver/crear registro de usuario en colección usuarios
    let u=Store.all("usuarios").find(x=>x.email===userObj.email);
    if(!u){
      const isFirst=Store.all("usuarios").length===0;
      const known=["avillalobos@akadem.cl","lmolina@akadem.cl"];
      u={id:uid(),email:userObj.email,nombre:userObj.nombre||userObj.email.split('@')[0],
         rol:(isFirst||known.includes(userObj.email))?"admin":"viewer"};
      await Store.set("usuarios",u);
    }
    Store.user=u;
    // primera vez en absoluto → sembrar datos demo
    if(Store.all("categorias_egreso").length===0) await Seed.run();
    this.renderUser();
    document.getElementById('gate').style.display="none";
    document.getElementById('app').style.display="block";
    document.body.className="role-"+u.rol;
    UI.restoreCollapse();
    Router.go(localStorage.getItem('erp_last_view')||"dashboard");
  },

  renderUser(){
    const u=Store.user; if(!u) return;
    document.getElementById('sbUname').textContent=u.nombre;
    document.getElementById('sbUrole').textContent={admin:"Administrador",financiero:"Financiero",viewer:"Solo lectura"}[u.rol]||u.rol;
    document.getElementById('sbAvatar').textContent=(u.nombre||"?").slice(0,2).toUpperCase();
  },

  logout(){
    if(fbReady && auth){ auth.signOut(); }
    Store.user=null;
    document.getElementById('app').style.display="none";
    document.getElementById('gate').style.display="flex";
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent="Ingresar";
    document.getElementById('loginPass').value="";
  },

  can(action){ // 'write' | 'config'
    const r=Store.user?Store.user.rol:"viewer";
    if(r==="admin") return true;
    if(r==="financiero") return action==="write";
    return false;
  }
};

/* ---------- CONFIRM propio (reemplaza confirm/prompt nativos) ----------
   Confirm.ask({title, message, detail, danger, word, okLabel}) → Promise<bool>
   - detail: línea explicando la consecuencia (punto 3 UX)
   - word: si se define, exige escribir esa palabra para habilitar OK
*/
const Confirm = {
  _resolve:null,
  ask(opts){
    return new Promise(resolve=>{
      this._resolve=resolve;
      const danger=!!opts.danger;
      const needWord=opts.word;
      document.getElementById('confTitle').textContent=opts.title||"Confirmar";
      document.getElementById('confBody').innerHTML=`
        <p style="font-size:14px;color:var(--ink);margin-bottom:${opts.detail||needWord?'12px':'0'}">${opts.message||""}</p>
        ${opts.detail?`<div class="conf-detail ${danger?'danger':''}">${opts.detail}</div>`:""}
        ${needWord?`<div class="fg" style="margin-top:14px"><label>Para confirmar, escribe <b>${esc(needWord)}</b></label>
          <input id="confWord" autocomplete="off" oninput="Confirm._checkWord('${esc(needWord)}')" placeholder="${esc(needWord)}"></div>`:""}`;
      const okBtn=document.getElementById('confOk');
      okBtn.textContent=opts.okLabel||(danger?"Eliminar":"Confirmar");
      okBtn.className="btn "+(danger?"btn-danger-solid":"btn-o");
      okBtn.disabled=!!needWord;
      document.getElementById('confBg').classList.add('show');
      if(needWord) setTimeout(()=>document.getElementById('confWord')?.focus(),60);
    });
  },
  _checkWord(w){ document.getElementById('confOk').disabled=(document.getElementById('confWord').value!==w); },
  _done(val){ document.getElementById('confBg').classList.remove('show'); if(this._resolve){ this._resolve(val); this._resolve=null; } }
};

/* ---------- audit line: "creado por X · fecha" ---------- */
function auditLine(doc){
  if(!doc||(!doc.createdBy&&!doc.createdAt)) return "";
  const who=(doc.createdBy||"—").split('@')[0];
  let s=`creado por ${esc(who)} · ${fmtFecha(doc.createdAt)}`;
  if(doc.updatedBy && doc.updatedAt && doc.updatedAt!==doc.createdAt){
    s+=` · editado por ${esc((doc.updatedBy||'').split('@')[0])} ${fmtFecha(doc.updatedAt)}`;
  }
  return `<div class="audit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${s}</div>`;
}

/* ---------- CÁLCULOS ECONÓMICOS COMPARTIDOS ---------- */
const Calc = {
  // transacciones de un proyecto
  txProyecto(pid){ return Store.all("transacciones").filter(t=>t.proyecto_ref===pid); },
  ingresos(pid,real){ return this.txProyecto(pid).filter(t=>t.tipo==="ingreso"&&(real===undefined||(t.real===true)===real)).reduce((s,t)=>s+(+t.monto||0),0); },
  egresos(pid,real){ return this.txProyecto(pid).filter(t=>t.tipo==="egreso"&&(real===undefined||(t.real===true)===real)).reduce((s,t)=>s+(+t.monto||0),0); },
  margenProyecto(pid){
    const ingR=this.ingresos(pid,true), egR=this.egresos(pid,true);
    const ingP=this.ingresos(pid), egP=this.egresos(pid);
    return { ingR, egR, margenReal:ingR-egR, ingP, egP, margenProy:ingP-egP };
  },
  // CxC: hitos de facturación pendientes ; CxP: hitos de pago pendientes
  cxc(){ return Store.all("hitos").filter(h=>h.tipo==="facturacion"&&!["cobrado"].includes(h.estado)); },
  cxp(){ return Store.all("hitos").filter(h=>h.tipo==="pago"&&!["pagado"].includes(h.estado)); },
  // flujo agregado por periodo
  flujoSerie(gran){ // gran: 'mes'|'trim'|'sem'|'anio'
    const tx=Store.all("transacciones");
    const buckets={};
    tx.forEach(t=>{
      const d=new Date(t.fecha||t.createdAt); if(isNaN(d)) return;
      const k=this._bucket(d,gran);
      if(!buckets[k]) buckets[k]={ingR:0,egR:0,ingP:0,egP:0,sort:this._sortKey(d,gran)};
      const real=t.real===true;
      if(t.tipo==="ingreso"){ buckets[k].ingP+=(+t.monto||0); if(real)buckets[k].ingR+=(+t.monto||0); }
      else{ buckets[k].egP+=(+t.monto||0); if(real)buckets[k].egR+=(+t.monto||0); }
    });
    return Object.entries(buckets).map(([k,v])=>({label:k,...v})).sort((a,b)=>a.sort-b.sort);
  },
  _bucket(d,g){
    const y=d.getFullYear(), m=d.getMonth();
    if(g==="mes")  return mesNombre(m)+" "+String(y).slice(-2);
    if(g==="trim") return "T"+(Math.floor(m/3)+1)+" "+y;
    if(g==="sem")  return (m<6?"S1":"S2")+" "+y;
    return String(y);
  },
  _sortKey(d,g){
    const y=d.getFullYear(), m=d.getMonth();
    if(g==="mes")  return y*12+m;
    if(g==="trim") return y*4+Math.floor(m/3);
    if(g==="sem")  return y*2+(m<6?0:1);
    return y;
  }
};

      ${kpiCard("Cuentas por pagar",fmt(cxpTot),Calc.cxp().length+" hitos de pago pendientes","var(--red)","var(--red-soft)",'<path d="M19 5L5 19M5 5l14 14"/>')}

const Dash={
  _f:null,_t:null,_c:null,
  irAHito(pid){ Router.go("proyectos"); setTimeout(()=>{ Proyectos.detail(pid); setTimeout(()=>document.querySelector('#proyTabs .tab[data-t="hitos"]')?.click(),150); },150); },
  drawFlujo(g){
    const serie=Calc.flujoSerie(g);
    const ctx=document.getElementById('chFlujo'); if(!ctx||typeof Chart==='undefined') return;
    if(this._f) this._f.destroy();
    this._f=new Chart(ctx,{type:'bar',data:{labels:serie.map(s=>s.label),datasets:[
      {label:'Ingreso real',data:serie.map(s=>s.ingR),backgroundColor:'#1F9D6B'},
      {label:'Egreso real',data:serie.map(s=>s.egR),backgroundColor:'#D6453A'},
      {label:'Ingreso proyectado',data:serie.map(s=>s.ingP),backgroundColor:'rgba(31,157,107,.35)'},
      {label:'Egreso proyectado',data:serie.map(s=>s.egP),backgroundColor:'rgba(214,69,58,.35)'}
    ]},options:chartOpts()});
  },
  drawTipo(){
    const ctx=document.getElementById('chTipo'); if(!ctx||typeof Chart==='undefined') return;
    if(this._t) this._t.destroy();
    const byTipo={};
    Store.all("proyectos").forEach(p=>{ const m=Calc.margenProyecto(p.id); byTipo[p.tipo]=(byTipo[p.tipo]||0)+m.margenReal; });
    const labels=Object.keys(byTipo);
    this._t=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Margen real',
      data:labels.map(l=>byTipo[l]),backgroundColor:'#E8490F'}]},
      options:{...chartOpts(),indexAxis:'y'}});
  },
  drawClientes(){
    const ctx=document.getElementById('chClientes'); if(!ctx||typeof Chart==='undefined') return;
    if(this._c) this._c.destroy();
    const byCli={};
    Store.all("facturas").filter(f=>f.estado!=="anulada").forEach(f=>{
      const n=empName(f.cliente_ref); byCli[n]=(byCli[n]||0)+(+f.total||0);
    });
    const top=Object.entries(byCli).sort((a,b)=>b[1]-a[1]).slice(0,6);
    this._c=new Chart(ctx,{type:'doughnut',data:{labels:top.map(t=>t[0]),
      datasets:[{data:top.map(t=>t[1]),backgroundColor:['#E8490F','#2D3142','#1F9D6B','#2563EB','#E0A106','#7C3AED']}]},
      options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:11}}}}}});
  }
};
function chartOpts(){ return {responsive:true,plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
  scales:{y:{ticks:{callback:v=>'$'+(v/1e6).toFixed(1)+'M',font:{size:10}}},x:{ticks:{font:{size:10}}}}}; }

function kpiCard(label,val,sub,col,bg,icon){

function pipeCard(p){
  const m=pipeMeta(p.estado);
  return `<div class="kcard" draggable="${Auth.can('write')}" data-id="${p.id}"
    ondragstart="Pipeline.dragStart(event,'${p.id}')" ondragend="Pipeline.dragEnd(event)"
    onclick="Pipeline.detail('${p.id}')">
    <div class="kcard-client">${esc(empName(p.cliente_ref))}</div>
    <div class="kcard-meta">${esc(p.titulo||tipoLabel(p.tipo))}</div>
    <div class="kcard-amt">${fmt(p.monto)}</div>
    <div class="prob-bar"><div class="prob-fill" style="width:${m.prob}%"></div></div>
    <div class="kcard-foot"><span class="chip" style="padding:2px 7px;font-size:11px">${p.tipo}</span><span style="font-size:11px;color:var(--muted)">${m.prob}%</span></div>
  </div>`;
}

const Pipeline={
  _drag:null,
  dragStart(e,id){ if(!Auth.can('write')){e.preventDefault();return;} this._drag=id; e.target.classList.add('dragging'); },
  dragEnd(e){ e.target.classList.remove('dragging'); },
  dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); },
  dragLeave(e){ e.currentTarget.classList.remove('dragover'); },
  async drop(e,estado){
    e.preventDefault(); e.currentTarget.classList.remove('dragover');
    if(!this._drag) return;
    const p=Store.get("propuestas",this._drag); if(!p) return;
    if(estado==="adjudicada" && p.estado!=="adjudicada"){ this._drag=null; return this.adjudicar(p.id); }
    p.estado=estado;
    p.historial=p.historial||[];
    p.historial.push({fecha:nowISO(),txt:"Movida a "+pipeMeta(estado).label,user:Store.user.email});
    await Store.set("propuestas",p);
    this._drag=null; Router.go("pipeline");
  },

  form(id){
    const p=id?Store.get("propuestas",id):{};
    Modal.open(id?"Editar propuesta":"Nueva propuesta",`
      <div class="form-grid">
        <div class="fg"><label>Cliente <span class="req">*</span></label>
          <select id="pp_cli"><option value="">— Selecciona —</option>${optEmpresas("any",p.cliente_ref)}</select>
          <div class="hint">¿No está? Créalo en Empresas primero.</div></div>
        <div class="form-row">
          <div class="fg"><label>Título / descripción</label><input id="pp_tit" value="${esc(p.titulo||'')}" placeholder="Programa de liderazgo 2026"></div>
          <div class="fg"><label>Tipo de servicio <span class="req">*</span></label><select id="pp_tipo"><option value="">—</option>${optTipos(p.tipo)}</select></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>Monto estimado (neto) <span class="req">*</span></label><input id="pp_monto" type="number" value="${p.monto||''}" placeholder="0"></div>
          <div class="fg"><label>Estado</label><select id="pp_estado">${ESTADOS_PIPELINE.filter(e=>e.key!=="adjudicada").map(e=>`<option value="${e.key}" ${p.estado===e.key?"selected":""}>${e.label}</option>`).join("")}</select></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>Fecha estimada de cierre</label><input id="pp_fecha" type="date" value="${p.fechaCierre||''}"></div>
          <div class="fg"><label>Responsable</label><input id="pp_resp" value="${esc(p.responsable||Store.user.nombre)}"></div>
        </div>
        <div class="fg"><label>Notas</label><textarea id="pp_notas" placeholder="Contexto, contactos, condiciones…">${esc(p.notas||'')}</textarea></div>
      </div>`,
      `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
       <button class="btn btn-o" onclick="Pipeline.save('${id||''}')">Guardar</button>`);
  },
  async save(id){
    const cli=document.getElementById('pp_cli').value;
    const tipo=document.getElementById('pp_tipo').value;
    const monto=+document.getElementById('pp_monto').value;
    if(!cli||!tipo||!monto){ toast("Cliente, tipo y monto son obligatorios","err"); return; }
    const p=id?Store.get("propuestas",id):{historial:[]};
    Object.assign(p,{
      cliente_ref:cli, tipo, monto,
      titulo:document.getElementById('pp_tit').value,
      estado:document.getElementById('pp_estado').value,
      fechaCierre:document.getElementById('pp_fecha').value,
      responsable:document.getElementById('pp_resp').value,
      notas:document.getElementById('pp_notas').value
    });
    if(!id){ p.historial=[{fecha:nowISO(),txt:"Propuesta creada",user:Store.user.email}]; }
    await Store.set("propuestas",p);
    Modal.close(); toast("Propuesta guardada","ok"); Router.go("pipeline");
  },

  detail(id){
    const p=Store.get("propuestas",id); if(!p) return;
    const m=pipeMeta(p.estado);
    Modal.open("Propuesta · "+empName(p.cliente_ref),`
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        <span class="badge ${m.badge}">${m.label}</span>
        <span class="chip">${p.tipo} · ${tipoLabel(p.tipo)}</span>
        <span class="chip">${fmt(p.monto)} neto</span>
        <span class="chip">Cierre: ${fmtFecha(p.fechaCierre)}</span>
      </div>
      <div class="card card-pad" style="margin-bottom:14px">
        <div class="t-strong">${esc(p.titulo||'Sin título')}</div>
        <div class="t-mut" style="margin-top:6px;font-size:13px">${esc(p.notas||'Sin notas')}</div>
        <div class="t-mut" style="margin-top:8px;font-size:12px">Responsable: ${esc(p.responsable||'—')}</div>
        ${auditLine(p)}
      </div>
      <div class="sect-title" style="font-size:14px">Seguimiento</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="pp_seg" placeholder="Añadir interacción…" style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;outline:none">
        <button class="btn btn-soft" onclick="Pipeline.addSeg('${id}')">Añadir</button>
      </div>
      <div style="max-height:200px;overflow-y:auto">
        ${(p.historial||[]).slice().reverse().map(h=>`<div style="padding:8px 0;border-bottom:1px solid #f0eee9">
          <div style="font-size:13px">${esc(h.txt)}</div>
          <div style="font-size:11px;color:var(--muted)">${fmtFecha(h.fecha)} · ${esc((h.user||'').split('@')[0])}</div>
        </div>`).join("")||'<div class="t-mut">Sin interacciones</div>'}
      </div>`,
      Auth.can('write')?`<button class="btn btn-danger" onclick="Pipeline.del('${id}')">Eliminar</button>
       <button class="btn btn-ghost" onclick="Pipeline.form('${id}')">Editar</button>
       ${p.estado!=="adjudicada"?`<button class="btn btn-o" onclick="Pipeline.adjudicar('${id}')">Adjudicar →</button>`:''}`:'',
      false);
  },
  async addSeg(id){
    const v=document.getElementById('pp_seg').value.trim(); if(!v) return;
    const p=Store.get("propuestas",id); p.historial=p.historial||[];
    p.historial.push({fecha:nowISO(),txt:v,user:Store.user.email});
    await Store.set("propuestas",p); this.detail(id);
  },
  async del(id){
    const p=Store.get("propuestas",id);
    const ok=await Confirm.ask({title:"Eliminar propuesta",danger:true,
      message:"¿Eliminar la propuesta de "+esc(empName(p.cliente_ref))+"?",
      detail:"Se borrará del pipeline junto con su historial de seguimiento. Esta acción no se puede deshacer."});
    if(!ok) return;
    await Store.del("propuestas",id); Modal.close(); toast("Eliminada"); Router.go("pipeline");
  },

  /* ---- ADJUDICAR: crea proyecto + centro de costo + permite cargar OC ---- */
  adjudicar(id){
    const p=Store.get("propuestas",id); if(!p) return;
    Modal.open("Adjudicar propuesta → crear proyecto",`
      <p style="color:var(--muted);margin-bottom:16px;font-size:13.5px">Se generará un <b>proyecto</b> con su <b>centro de costo</b> y código interno automático. Podrás cargar la OC a continuación.</p>
      <div class="form-grid">
        <div class="card card-pad" style="background:var(--light)">
          <div class="mini-stat"><span class="l">Cliente</span><span class="v" style="font-size:14px">${esc(empName(p.cliente_ref))}</span></div>
          <div class="divider" style="margin:12px 0"></div>
          <div class="form-row">
            <div class="mini-stat"><span class="l">Tipo</span><span class="v" style="font-size:14px">${p.tipo}</span></div>
            <div class="mini-stat"><span class="l">Monto neto</span><span class="v" style="font-size:14px">${fmt(p.monto)}</span></div>
          </div>
        </div>
        <div class="form-row">
          <div class="fg"><label>Fecha inicio</label><input id="aj_ini" type="date" value="${todayISO()}"></div>
          <div class="fg"><label>Fecha término estimada</label><input id="aj_fin" type="date"></div>
        </div>
        <div class="fg"><label>Condiciones comerciales</label><textarea id="aj_cond" placeholder="Forma de pago, hitos, OC, OTIC…">${esc(p.notas||'')}</textarea></div>
      </div>`,
      `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
       <button class="btn btn-o" onclick="Pipeline.confirmAdjudicar('${id}')">Crear proyecto</button>`);
  },
  async confirmAdjudicar(id){
    const p=Store.get("propuestas",id);
    const codigo=await genProjectCode(empName(p.cliente_ref),p.tipo);
    const cc={id:uid(),nombre:"CC "+codigo};
    await Store.set("centros_costo",cc);
    const proy={ id:uid(), codigo, propuesta_ref:id, cliente_ref:p.cliente_ref, tipo:p.tipo,
      titulo:p.titulo, centro_costo_ref:cc.id, montoTotal:p.monto, estado:"activo",
      condiciones:document.getElementById('aj_cond').value,
      fechaIni:document.getElementById('aj_ini').value, fechaFin:document.getElementById('aj_fin').value };
    await Store.set("proyectos",proy);
    cc.proyecto_ref=proy.id; await Store.set("centros_costo",cc);
    p.estado="adjudicada"; p.historial=p.historial||[];
    p.historial.push({fecha:nowISO(),txt:"Adjudicada → proyecto "+codigo,user:Store.user.email});
    await Store.set("propuestas",p);
    Modal.close(); toast("Proyecto "+codigo+" creado","ok");
    Router.go("proyectos"); setTimeout(()=>Proyectos.detail(proy.id),200);
  }
};

/* =====================================================================
   VISTA: PROYECTOS + centros de costo
   ===================================================================== */
Views.proyectos=function(){
  UI.setHeader("Proyectos adjudicados","Centros de costo · ingresos, egresos, hitos y margen");
  const proys=Store.all("proyectos");
  if(!proys.length){ UI.render(emptyState("Sin proyectos aún","Adjudica una propuesta en el Pipeline para generar el primer proyecto.",
    `<button class="btn btn-o" onclick="Router.go('pipeline')">Ir al Pipeline</button>`)); return; }

  UI.render(`
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div class="search-inp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg><input id="proySearch" placeholder="Buscar código o cliente…" oninput="Proyectos.refresh()"></div>
      <select id="proyEstadoF" onchange="Proyectos.refresh()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:9px;outline:none"><option value="">Todos los estados</option><option value="activo">Activos</option><option value="en pausa">En pausa</option><option value="cerrado">Cerrados</option></select>
    </div>
    <div class="tbl-wrap" id="proyTblWrap"></div>`);
  Proyectos._sort={key:"codigo",dir:1};
  Proyectos.refresh();
};

const Proyectos={
  _sort:{key:"codigo",dir:1},
  setSort(key){ if(this._sort.key===key) this._sort.dir*=-1; else this._sort={key,dir:1}; this.refresh(); },
  refresh(){
    const q=(document.getElementById('proySearch')?.value||"").toLowerCase();
    const ef=document.getElementById('proyEstadoF')?.value||"";
    let list=Store.all("proyectos").filter(p=>
      (!ef||p.estado===ef) &&
      (!q||(p.codigo||"").toLowerCase().includes(q)||empName(p.cliente_ref).toLowerCase().includes(q)));
    const sk=this._sort.key, dir=this._sort.dir;
    const val=p=>{ const m=Calc.margenProyecto(p.id);
      return {codigo:p.codigo||"",cliente:empName(p.cliente_ref),monto:+p.montoTotal||0,ing:m.ingR,margen:m.margenReal}[sk]; };
    list.sort((a,b)=>{ const x=val(a),y=val(b); return (typeof x==="number"?x-y:String(x).localeCompare(String(y)))*dir; });
    const arrow=k=>this._sort.key===k?(this._sort.dir>0?'<span class="arr">▲</span>':'<span class="arr">▼</span>'):'<span class="arr">⇅</span>';
    const cls=k=>"sortable"+(this._sort.key===k?(this._sort.dir>0?" asc":" desc"):"");
    document.getElementById('proyTblWrap').innerHTML=`<table>
      <thead><tr>
        <th class="${cls('codigo')}" onclick="Proyectos.setSort('codigo')">Código ${arrow('codigo')}</th>
        <th class="${cls('cliente')}" onclick="Proyectos.setSort('cliente')">Cliente ${arrow('cliente')}</th>
        <th>Tipo</th><th>Estado</th>
        <th class="num ${cls('monto')}" onclick="Proyectos.setSort('monto')">Monto ${arrow('monto')}</th>
        <th class="num ${cls('ing')}" onclick="Proyectos.setSort('ing')">Ing. real ${arrow('ing')}</th>
        <th class="num ${cls('margen')}" onclick="Proyectos.setSort('margen')">Margen real ${arrow('margen')}</th>
        <th>Hitos</th><th></th></tr></thead>
      <tbody>${list.length?list.map(p=>{
        const m=Calc.margenProyecto(p.id);
        const hitos=Store.all("hitos").filter(h=>h.proyecto_ref===p.id);
        const pend=hitos.filter(h=>!["cobrado","pagado"].includes(h.estado)).length;
        return `<tr style="cursor:pointer" onclick="Proyectos.detail('${p.id}')">
          <td class="t-strong mono" style="font-size:12px">${esc(p.codigo)}</td>
          <td>${esc(empName(p.cliente_ref))}</td>
          <td><span class="chip" style="padding:2px 8px">${p.tipo}</span></td>
          <td><span class="badge ${p.estado==='activo'?'b-blue':p.estado==='cerrado'?'b-gray':'b-amber'}">${p.estado}</span></td>
          <td class="num">${fmt(p.montoTotal)}</td>
          <td class="num">${fmt(m.ingR)}</td>
          <td class="num t-strong" style="color:${m.margenReal>=0?'var(--green)':'var(--red)'}">${fmt(m.margenReal)}</td>
          <td>${hitos.length?`<span class="badge ${pend?'b-amber':'b-green'}">${hitos.length-pend}/${hitos.length}</span>`:'<span class="t-mut">—</span>'}</td>
          <td class="t-actions"><span class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6" stroke-linecap="round"/></svg></span></td>
        </tr>`;
      }).join(""):'<tr><td colspan="9" class="empty">Sin resultados</td></tr>'}</tbody></table>`;
  },
  detail(id){
    const p=Store.get("proyectos",id); if(!p) return;
    const m=Calc.margenProyecto(p.id);
    const hitos=Store.all("hitos").filter(h=>h.proyecto_ref===id);
    const tx=Calc.txProyecto(id);
    const oc=Store.all("ordenes_compra").find(o=>o.proyecto_ref===id);
    const pctMargen=m.ingR>0?(m.margenReal/m.ingR*100):0;

    Modal.open("Proyecto "+p.codigo,`
      <div class="tabs" id="proyTabs">
        <div class="tab active" data-t="resumen">Resumen</div>
        <div class="tab" data-t="hitos">Hitos (${hitos.length})</div>
        <div class="tab" data-t="tx">Transacciones (${tx.length})</div>
        <div class="tab" data-t="oc">OC</div>
      </div>
      <div id="proyTab"></div>`,
      Auth.can('write')?`<button class="btn btn-ghost" onclick="Proyectos.estado('${id}')">Cambiar estado</button>
        <button class="btn btn-o" onclick="Facturacion.proformaFor('${id}')">Generar proforma</button>`:'',true);

    document.querySelectorAll('#proyTabs .tab').forEach(t=>t.onclick=()=>{
      document.querySelectorAll('#proyTabs .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active'); Proyectos._tab(id,t.dataset.t);
    });
    Proyectos._tab(id,"resumen");
  },
  _tab(id,tab){
    const p=Store.get("proyectos",id);
    const m=Calc.margenProyecto(id);
    const host=document.getElementById('proyTab');
    if(tab==="resumen"){
      const pct=m.ingR>0?(m.margenReal/m.ingR*100):0;
      host.innerHTML=`
        <div class="grid g2" style="margin-bottom:14px">
          <div class="card card-pad"><div class="mini-stat"><span class="l">Cliente</span><span class="v" style="font-size:15px">${esc(empName(p.cliente_ref))}</span></div></div>
          <div class="card card-pad"><div class="mini-stat"><span class="l">Tipo de servicio</span><span class="v" style="font-size:15px">${tipoLabel(p.tipo)}</span></div></div>
        </div>
        <div class="grid g4" style="margin-bottom:14px">
          <div class="kpi" style="padding:14px"><div class="kpi-label">Monto OC</div><div class="kpi-val" style="font-size:20px">${fmt(p.montoTotal)}</div></div>
          <div class="kpi" style="padding:14px"><div class="kpi-label">Ingreso real</div><div class="kpi-val" style="font-size:20px;color:var(--green)">${fmt(m.ingR)}</div></div>
          <div class="kpi" style="padding:14px"><div class="kpi-label">Egreso real</div><div class="kpi-val" style="font-size:20px;color:var(--red)">${fmt(m.egR)}</div></div>
          <div class="kpi" style="padding:14px"><div class="kpi-label">Margen</div><div class="kpi-val" style="font-size:20px;color:${m.margenReal>=0?'var(--green)':'var(--red)'}">${fmt(m.margenReal)}</div><div class="kpi-sub">${pct.toFixed(1)}%</div></div>
        </div>
        <div class="card card-pad">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px"><span>Ejecución de ingresos (real vs proyectado)</span><span>${m.ingP>0?Math.round(m.ingR/m.ingP*100):0}%</span></div>
          <div class="bar"><div class="bar-fill" style="width:${m.ingP>0?Math.min(100,m.ingR/m.ingP*100):0}%;background:var(--green)"></div></div>
          <div style="font-size:12px;color:var(--muted);margin-top:10px">${esc(p.condiciones||'Sin condiciones registradas')}</div>
        </div>
        ${auditLine(p)}`;
    }
    if(tab==="hitos"){
      const hitos=Store.all("hitos").filter(h=>h.proyecto_ref===id);
      host.innerHTML=`
        ${Auth.can('write')?`<button class="btn btn-soft btn-sm" style="margin-bottom:12px" onclick="Proyectos.hitoForm('${id}')">+ Añadir hito</button>`:''}
        ${hitos.length?`<div class="tbl-wrap"><table><thead><tr><th>Tipo</th><th>Descripción</th><th class="num">Monto</th><th>Programada</th><th>Estado</th><th></th></tr></thead>
          <tbody>${hitos.map(h=>`<tr>
            <td><span class="badge ${h.tipo==='facturacion'?'b-green':'b-red'}">${h.tipo==='facturacion'?'Facturar':'Pagar'}</span></td>
            <td>${esc(h.desc||'')}</td><td class="num">${fmt(h.monto)}</td><td>${fmtFecha(h.fechaProg)}</td>
            <td><span class="badge ${hitoBadge(h.estado)}">${h.estado}</span></td>
            <td class="t-actions">${Auth.can('write')?`<span class="icon-btn" onclick="Proyectos.hitoForm('${id}','${h.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="icon-btn del" onclick="Proyectos.hitoDel('${id}','${h.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`:''}</td>
          </tr>`).join("")}</tbody></table></div>`:'<div class="empty" style="padding:30px"><p>Sin hitos. Añade hitos de facturación y pago.</p></div>'}`;
    }
    if(tab==="tx"){
      const tx=Calc.txProyecto(id);
      host.innerHTML=`
        ${Auth.can('write')?`<button class="btn btn-soft btn-sm" style="margin-bottom:12px" onclick="Proyectos.txForm('${id}')">+ Registrar transacción</button>`:''}
        ${tx.length?`<div class="tbl-wrap"><table><thead><tr><th>Tipo</th><th>Concepto</th><th>Contraparte</th><th class="num">Monto</th><th>Fecha</th><th>Estado</th><th></th></tr></thead>
          <tbody>${tx.map(t=>`<tr>
            <td><span class="badge ${t.tipo==='ingreso'?'b-green':'b-red'}">${t.tipo}</span></td>
            <td>${esc(t.concepto||'')}</td>
            <td class="t-mut">${t.empresa_ref?esc(empName(t.empresa_ref)):t.persona_ref?esc(persName(t.persona_ref)):t.categoria_ref?esc((Store.get('categorias_egreso',t.categoria_ref)||{}).nombre||'—'):'—'}</td>
            <td class="num">${fmt(t.monto)}</td><td>${fmtFecha(t.fecha)}</td>
            <td><span class="badge ${t.real?'b-green':'b-amber'}">${t.real?'real':'proyectado'}</span></td>
            <td class="t-actions">${Auth.can('write')?`<span class="icon-btn del" onclick="Proyectos.txDel('${id}','${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`:''}</td>
          </tr>`).join("")}</tbody></table></div>`:'<div class="empty" style="padding:30px"><p>Sin transacciones registradas.</p></div>'}`;
    }
    if(tab==="oc"){
      const oc=Store.all("ordenes_compra").find(o=>o.proyecto_ref===id);
      host.innerHTML=`

  ocForm(pid){
    const oc=Store.all("ordenes_compra").find(o=>o.proyecto_ref===pid)||{};
    Modal.open("Orden de Compra",`

        <textarea id="oc_raw" placeholder="Pega aquí el texto de la OC…" style="width:100%;min-height:80px;padding:10px;border:1.5px solid var(--border);border-radius:9px;outline:none"></textarea>
        <button class="btn btn-soft btn-sm" style="margin-top:8px" onclick="Proyectos.ocExtract()">Extraer datos</button>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <div class="fg"><label>N° OC</label><input id="oc_num" value="${esc(oc.numero||'')}"></div>
          <div class="fg"><label>Monto OC</label><input id="oc_monto" type="number" value="${oc.monto||''}"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>Emisor / OTIC</label><input id="oc_emisor" value="${esc(oc.emisor||'')}"></div>
          <div class="fg"><label>Fecha OC</label><input id="oc_fecha" type="date" value="${oc.fecha||''}"></div>
        </div>
      </div>`,
      `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
       <button class="btn btn-o" onclick="Proyectos.ocSave('${pid}','${oc.id||''}')">Guardar OC</button>`);
  },
  ocExtract(){
    const raw=document.getElementById('oc_raw').value;
    // extracción heurística (heredada del CashFlow): num OC, monto, fecha
    const num=raw.match(/(?:OC|orden\s*de\s*compra|n[°º]?)\s*[:\-]?\s*(\d{3,})/i);
    if(num) document.getElementById('oc_num').value=num[1];
    const montos=[...raw.matchAll(/\$?\s*([\d.]{4,})/g)].map(m=>+m[1].replace(/\./g,"")).filter(n=>n>10000);
    if(montos.length) document.getElementById('oc_monto').value=Math.max(...montos);
    const fecha=raw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if(fecha){ let[_,d,m,y]=fecha; y=y.length===2?"20"+y:y; document.getElementById('oc_fecha').value=`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
    const otic=raw.match(/(?:OTIC|emisor)\s*[:\-]?\s*([A-Za-zÁÉÍÓÚñ ]{3,40})/i);
    if(otic) document.getElementById('oc_emisor').value=otic[1].trim();
    toast("Datos extraídos — revísalos","ok");
  },
  async ocSave(pid,ocid){
    const oc=ocid?Store.get("ordenes_compra",ocid):{proyecto_ref:pid};
    Object.assign(oc,{numero:document.getElementById('oc_num').value,monto:+document.getElementById('oc_monto').value,
      emisor:document.getElementById('oc_emisor').value,fecha:document.getElementById('oc_fecha').value});
    await Store.set("ordenes_compra",oc);
    const proy=Store.get("proyectos",pid); proy.OC_ref=oc.id; await Store.set("proyectos",proy);
    toast("OC guardada","ok"); Proyectos.detail(pid);
    setTimeout(()=>document.querySelector('#proyTabs .tab[data-t="oc"]')?.click(),100);
  },

Views.flujo=function(){
  UI.setHeader("Flujo económico","Real vs proyectado · agregado y por proyecto");
  UI.setActions(`<div class="pill-toggle" id="flGran">
    <button data-g="mes" class="active">Mensual</button><button data-g="trim">Trimestral</button>
    <button data-g="sem">Semestral</button><button data-g="anio">Anual</button></div>`);

  UI.render(`
    <div class="card card-pad" style="margin-bottom:16px">
      <div class="sect-title">Flujo consolidado del negocio</div>
      <canvas id="chFlujoBig" height="90"></canvas>
    </div>
    <div class="card card-pad">
      <div class="sect-title">Detalle por periodo</div>
      <div class="tbl-wrap" style="border:none" id="flTabla"></div>
    </div>`);

  document.querySelectorAll('#flGran button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#flGran button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); Flujo.draw(b.dataset.g);
  });
  Flujo.draw("mes");

const Flujo={ _ch:null,
  draw(g){
    const s=Calc.flujoSerie(g);
    // tabla primero (no depende de Chart)
    document.getElementById('flTabla').innerHTML=`<table><thead><tr><th>Periodo</th><th class="num">Ing. real</th><th class="num">Eg. real</th><th class="num">Neto real</th><th class="num">Ing. proy</th><th class="num">Eg. proy</th><th class="num">Neto proy</th></tr></thead>
      <tbody>${s.map(x=>`<tr><td class="t-strong">${x.label}</td>
        <td class="num" style="color:var(--green)">${fmt(x.ingR)}</td><td class="num" style="color:var(--red)">${fmt(x.egR)}</td>
        <td class="num t-strong">${fmt(x.ingR-x.egR)}</td>
        <td class="num t-mut">${fmt(x.ingP)}</td><td class="num t-mut">${fmt(x.egP)}</td><td class="num">${fmt(x.ingP-x.egP)}</td></tr>`).join("")||'<tr><td colspan="7" class="empty">Sin datos</td></tr>'}</tbody></table>`;
    // gráfico (si Chart está disponible)
    const ctx=document.getElementById('chFlujoBig'); if(!ctx||typeof Chart==='undefined')return;
    if(this._ch)this._ch.destroy();
    let acc=0; const saldo=s.map(x=>{ acc+=(x.ingR-x.egR); return acc; });
    this._ch=new Chart(ctx,{type:'bar',data:{labels:s.map(x=>x.label),datasets:[
      {label:'Ingreso real',data:s.map(x=>x.ingR),backgroundColor:'#1F9D6B',order:2},
      {label:'Egreso real',data:s.map(x=>x.egR),backgroundColor:'#D6453A',order:2},
      {type:'line',label:'Saldo acumulado',data:saldo,borderColor:'#E8490F',backgroundColor:'transparent',borderWidth:2,tension:.3,order:1}
    ]},options:chartOpts()});
  }
};

const Facturacion={
  proformaFor(pid){ Modal.close(); setTimeout(()=>this.form(pid),150); },
  form(pid){
    const proys=Store.all("proyectos");
    const p=pid?Store.get("proyectos",pid):null;
    Modal.open("Nueva proforma",`
      <div class="form-grid">
        <div class="fg"><label>Proyecto <span class="req">*</span></label>
          <select id="f_proy" onchange="Facturacion._fillCli()">
            <option value="">— Selecciona —</option>
            ${proys.map(x=>`<option value="${x.id}" ${pid===x.id?'selected':''}>${esc(x.codigo)} · ${esc(empName(x.cliente_ref))}</option>`).join("")}</select></div>
        <div class="form-row">
          <div class="fg"><label>Concepto</label><input id="f_concepto" value="${p?esc(p.titulo||tipoLabel(p.tipo)):''}" placeholder="Servicios de capacitación"></div>
          <div class="fg"><label>Monto neto <span class="req">*</span></label><input id="f_neto" type="number" oninput="Facturacion._calc()" value="${p?p.montoTotal:''}"></div>
        </div>
        <div class="card card-pad" style="background:var(--light)">
          <div class="form-row">
            <div class="mini-stat"><span class="l">Neto</span><span class="v" id="f_vNeto">$0</span></div>
            <div class="mini-stat"><span class="l">IVA 19%</span><span class="v" id="f_vIva">$0</span></div>
          </div>
          <div class="divider" style="margin:10px 0"></div>
          <div class="mini-stat"><span class="l">Total</span><span class="v" id="f_vTotal" style="font-size:20px;color:var(--orange-deep)">$0</span></div>
        </div>
        <div class="fg"><label>Hito asociado (opcional)</label><select id="f_hito"><option value="">— Ninguno —</option></select></div>
      </div>`,
      `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
       <button class="btn btn-o" onclick="Facturacion.save()">Crear proforma</button>`);
    if(pid){ this._fillCli(); this._calc(); }
  },
  _fillCli(){
    const pid=document.getElementById('f_proy').value;
    const hitos=Store.all("hitos").filter(h=>h.proyecto_ref===pid&&h.tipo==="facturacion");
    document.getElementById('f_hito').innerHTML='<option value="">— Ninguno —</option>'+hitos.map(h=>`<option value="${h.id}">${esc(h.desc||'Hito')} · ${fmt(h.monto)}</option>`).join("");
  },
  _calc(){
    const neto=+document.getElementById('f_neto').value||0;
    document.getElementById('f_vNeto').textContent=fmt(neto);
    document.getElementById('f_vIva').textContent=fmt(neto*IVA);

  async save(){
    const pid=document.getElementById('f_proy').value;
    const neto=+document.getElementById('f_neto').value;
    if(!pid||!neto){ toast("Proyecto y monto requeridos","err"); return; }
    const p=Store.get("proyectos",pid);
    const folioInt="PF-"+String(Store.all("facturas").length+1).padStart(4,"0");
    const f={proyecto_ref:pid,cliente_ref:p.cliente_ref,tipo:"proforma",
      concepto:document.getElementById('f_concepto').value,
      neto,iva:Math.round(neto*IVA),total:Math.round(neto*(1+IVA)),
      hito_ref:document.getElementById('f_hito').value||null,
      estado:"proforma",folioInt,folioSII:"",fecha:todayISO()};
    await Store.set("facturas",f);
    Modal.close(); toast("Proforma "+folioInt+" creada","ok"); Router.go("facturacion");
    setTimeout(()=>this.pdf(f.id),200);
  },

  estado(id){
    const f=Store.get("facturas",id);
    Modal.open("Estado de factura · "+f.folioInt,`
      <div class="card card-pad" style="background:var(--blue-soft);margin-bottom:16px">
        <div style="font-size:12.5px;color:var(--blue)">
          <b>Integración SII (Fase 2):</b> la emisión automática en el SII requiere certificado digital, folios CAF y un proveedor autorizado. Por ahora emite la factura en tu sistema habitual y registra aquí el folio.

          ${['proforma','emitida','cobrada','anulada'].map(s=>`<option value="${s}" ${f.estado===s?'selected':''}>${s}</option>`).join("")}</select></div>
        <div class="fg"><label>Folio SII (manual)</label><input id="fe_folio" value="${esc(f.folioSII||'')}" placeholder="N° de factura electrónica emitida"></div>
      </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01" stroke-linecap="round"/></svg>
        <div style="font-size:12px;color:var(--navy-soft)">La emisión electrónica directa al SII llegará en una próxima etapa. Por ahora emites la factura en tu sistema habitual y registras aquí el folio.</div>
      </div>`,
      `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
       <button class="btn btn-o" onclick="Facturacion.estadoSave('${id}')">Guardar</button>`);
  },
  async estadoSave(id){
    const f=Store.get("facturas",id);
    f.estado=document.getElementById('fe_estado').value;
    f.folioSII=document.getElementById('fe_folio').value;
    if(f.estado!=="proforma"&&f.folioSII) f.tipo="factura";
    // si se marca cobrada y hay hito asociado → actualizar hito
    if(f.estado==="cobrada"&&f.hito_ref){ const h=Store.get("hitos",f.hito_ref); if(h){ h.estado="cobrado"; await Store.set("hitos",h); } }
    await Store.set("facturas",f); Modal.close(); toast("Actualizada","ok"); Router.go("facturacion");
  },

  pdf(id){
    const f=Store.get("facturas",id); const p=Store.get("proyectos",f.proyecto_ref);
    const cli=Store.get("empresas",f.cliente_ref)||{};
    const { jsPDF }=window.jspdf; const doc=new jsPDF();
    const O=[232,73,15], N=[45,49,66];
    // header
    doc.setFillColor(...N); doc.rect(0,0,210,32,"F");
    doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(20);
    doc.text("AKADEM",14,16); doc.setTextColor(...O); doc.text("SpA",46,16);
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(220);
    doc.text("Transformamos aprendizaje en resultados",14,23);
    doc.text("administracion@akadem.cl · +56 2 2993 5626 · www.akadem.cl",14,28);
    // titulo doc
    doc.setTextColor(...O); doc.setFont("helvetica","bold"); doc.setFontSize(15);
    doc.text("FACTURA PROFORMA",196,14,{align:"right"});
    doc.setTextColor(...N); doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("Folio interno: "+f.folioInt,196,21,{align:"right"});
    doc.text("Fecha: "+fmtFecha(f.fecha),196,26,{align:"right"});
    // cliente
    let y=44;
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.text("CLIENTE",14,y);
    doc.setFont("helvetica","normal"); doc.setFontSize(9); y+=6;
    doc.text(cli.razon||"—",14,y); y+=5;
    if(cli.rut) doc.text("RUT: "+formatRut(cli.rut),14,y),y+=5;
    if(cli.giro) doc.text("Giro: "+cli.giro,14,y),y+=5;
    if(cli.direccion) doc.text(cli.direccion,14,y),y+=5;
    doc.setFont("helvetica","bold"); doc.text("PROYECTO",120,44);
    doc.setFont("helvetica","normal");
    doc.text(p?p.codigo:"—",120,50); doc.text(tipoLabel(p?p.tipo:"")||"",120,55);
    // tabla
    y=Math.max(y,62)+6;
    doc.setFillColor(...N); doc.rect(14,y,182,8,"F");
    doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("DESCRIPCIÓN",18,y+5.5); doc.text("MONTO",192,y+5.5,{align:"right"});
    y+=8; doc.setTextColor(...N); doc.setFont("helvetica","normal");
    doc.rect(14,y,182,9); doc.text(f.concepto||"Servicios de capacitación",18,y+6);
    doc.text(fmt(f.neto),192,y+6,{align:"right"}); y+=9;
    // totales
    y+=4;
    const row=(l,v,bold)=>{ doc.setFont("helvetica",bold?"bold":"normal"); doc.setFontSize(bold?11:9);
      doc.text(l,150,y,{align:"right"}); doc.text(v,192,y,{align:"right"}); y+=7; };
    row("Neto:",fmt(f.neto)); row("IVA 19%:",fmt(f.iva));
    doc.setDrawColor(...O); doc.line(120,y-3,196,y-3); y+=2;
    doc.setTextColor(...O); row("TOTAL:",fmt(f.total),true);
    // footer
    doc.setTextColor(150); doc.setFontSize(7.5); doc.setFont("helvetica","italic");
    doc.text("Documento PROFORMA — no constituye documento tributario. La factura electrónica se emite por separado vía SII.",14,280);
    doc.text("AKADEM SpA · Documento generado por ERP AKADEM el "+fmtFecha(todayISO()),14,285);
    doc.save("Proforma_"+f.folioInt+"_"+(cli.razon||"cliente").replace(/\s/g,"_")+".pdf");
    toast("PDF generado","ok");
  }
};

const Empresas={
  filter(){
    const q=(document.getElementById('empSearch').value||"").toLowerCase();

    const list=Store.all("empresas").filter(e=>
      (!tf||e.tipo===tf)&&(!q||(e.razon||"").toLowerCase().includes(q)||(e.rut||"").includes(q)));

      <td class="t-mut">${esc(e.giro||'—')}</td><td class="t-mut">${esc(e.contacto||'—')}</td>
      <td class="t-actions">${Auth.can('write')?`<span class="icon-btn" onclick="Empresas.form('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="icon-btn del" onclick="Empresas.del('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`:''}</td>
    </tr>`).join(""):'<tr><td colspan="6" class="empty">Sin empresas</td></tr>';
  },
  form(id){
    const e=id?Store.get("empresas",id):{tipo:"cliente"};
    Modal.open(id?"Editar empresa":"Nueva empresa",`
      <div class="form-grid">
        <div class="form-row">
          <div class="fg"><label>Razón social <span class="req">*</span></label><input id="e_razon" value="${esc(e.razon||'')}"></div>
          <div class="fg"><label>RUT</label><input id="e_rut" value="${e.rut?formatRut(e.rut):''}" placeholder="76.123.456-7" onblur="Empresas._vRut()"><div class="hint" id="e_rutHint"></div></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>Tipo <span class="req">*</span></label><select id="e_tipo"><option value="cliente" ${e.tipo==='cliente'?'selected':''}>Cliente</option><option value="alianza" ${e.tipo==='alianza'?'selected':''}>Alianza</option><option value="proveedor" ${e.tipo==='proveedor'?'selected':''}>Proveedor</option></select></div>
          <div class="fg"><label>Giro</label><input id="e_giro" value="${esc(e.giro||'')}"></div>
        </div>
        <div class="fg"><label>Dirección</label><input id="e_dir" value="${esc(e.direccion||'')}"></div>
        <div class="form-row">
          <div class="fg"><label>Contacto</label><input id="e_contacto" value="${esc(e.contacto||'')}" placeholder="Nombre · email · teléfono"></div>
          <div class="fg"><label>Condiciones de pago</label><input id="e_pago" value="${esc(e.condPago||'')}" placeholder="30 días / contra factura…"></div>
        </div>
        <div class="fg"><label>Datos de facturación adicionales</label><textarea id="e_fact" placeholder="Email de facturación, OTIC asociado…">${esc(e.datosFact||'')}</textarea></div>
      </div>`,
      `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
       <button class="btn btn-o" onclick="Empresas.save('${id||''}')">Guardar</button>`);
  },
  _vRut(){ const v=document.getElementById('e_rut').value; const h=document.getElementById('e_rutHint');
    if(!v){h.textContent="";return;} const ok=validaRut(v); h.textContent=ok?"✓ RUT válido":"✗ RUT inválido"; h.style.color=ok?"var(--green)":"var(--red)"; },
  async save(id){
    const razon=document.getElementById('e_razon').value.trim();
    if(!razon){ toast("Razón social requerida","err"); return; }
    const rut=document.getElementById('e_rut').value;
    if(rut&&!validaRut(rut)){ toast("RUT inválido","err"); return; }
    const e=id?Store.get("empresas",id):{};
    Object.assign(e,{razon,rut:rut?cleanRut(rut):"",tipo:document.getElementById('e_tipo').value,
      giro:document.getElementById('e_giro').value,direccion:document.getElementById('e_dir').value,
      contacto:document.getElementById('e_contacto').value,condPago:document.getElementById('e_pago').value,
      datosFact:document.getElementById('e_fact').value});
    await Store.set("empresas",e); Modal.close(); toast("Empresa guardada","ok"); Views.empresas();
  },
  async del(id){
    const used=Store.all("propuestas").some(p=>p.cliente_ref===id)||Store.all("proyectos").some(p=>p.cliente_ref===id);
    if(used){ toast("No se puede: tiene propuestas o proyectos asociados","err"); return; }
    const e=Store.get("empresas",id);
    const ok=await Confirm.ask({title:"Eliminar empresa",danger:true,
      message:"¿Eliminar a "+esc(e.razon)+"?",
      detail:"No tiene propuestas ni proyectos asociados, así que es seguro eliminarla."});
    if(!ok) return;
    await Store.del("empresas",id); toast("Eliminada"); Views.empresas();
  }
};

    document.getElementById('cfgHost').innerHTML=`<div class="loading"><div class="spin"></div><div>Limpiando…</div></div>`;
