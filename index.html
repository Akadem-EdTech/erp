/* =====================================================================
   REPORTES — los 14 reportes de gestión, en una pestaña
   Reutiliza Calc y Tes; añade cálculos faltantes.
   ===================================================================== */
const Rep = {
  /* ---------- cálculos faltantes ---------- */
  // embudo: conteo, monto y tiempo medio por etapa
  embudo(){
    return ESTADOS_PIPELINE.filter(e=>e.key!=="perdida").map(e=>{
      const items=Store.all("propuestas").filter(p=>p.estado===e.key);
      const monto=items.reduce((s,p)=>s+(+p.monto||0),0);
      return {etapa:e.label,key:e.key,n:items.length,monto,prob:e.prob};
    });
  },
  // win rate global y por tipo
  winRate(filtroTipo){
    let props=Store.all("propuestas").filter(p=>["adjudicada","perdida"].includes(p.estado));
    if(filtroTipo) props=props.filter(p=>p.tipo===filtroTipo);
    const g=props.filter(p=>p.estado==="adjudicada").length, perd=props.filter(p=>p.estado==="perdida").length;
    return {ganadas:g,perdidas:perd,total:g+perd,rate:(g+perd)>0?g/(g+perd)*100:0};
  },
  winRatePorTipo(){
    return TIPOS_SERVICIO.map(t=>({tipo:t.code,label:t.label,...this.winRate(t.code)})).filter(r=>r.total>0);
  },
  // rentabilidad por tipo de servicio
  rentabilidadTipo(){
    const map={};
    Store.all("proyectos").forEach(p=>{ const m=Calc.margenProyecto(p.id);
      if(!map[p.tipo]) map[p.tipo]={tipo:p.tipo,ingreso:0,egreso:0,margen:0,n:0};
      map[p.tipo].ingreso+=m.ingR; map[p.tipo].egreso+=m.egR; map[p.tipo].margen+=m.margenReal; map[p.tipo].n++;
    });
    return Object.values(map).map(r=>({...r,pct:r.ingreso>0?r.margen/r.ingreso*100:0})).sort((a,b)=>b.margen-a.margen);
  },
  // concentración de cartera por cliente (sobre facturación + ingresos reales)
  concentracion(){
    const map={};
    Store.all("proyectos").forEach(p=>{ const m=Calc.margenProyecto(p.id);
      const cli=empName(p.cliente_ref); map[cli]=(map[cli]||0)+m.ingR; });
    const total=Object.values(map).reduce((s,v)=>s+v,0);
    return {total,items:Object.entries(map).map(([cli,v])=>({cli,monto:v,pct:total>0?v/total*100:0})).sort((a,b)=>b.monto-a.monto)};
  },
  // semáforo de margen por proyecto
  semaforoProyectos(){
    return Store.all("proyectos").map(p=>{
      const m=Calc.margenProyecto(p.id);
      const obj=+p.montoTotal||0;
      const pctEjec=obj>0?m.egR/obj*100:0;
      const margenPct=m.ingR>0?m.margenReal/m.ingR*100:0;
      let estado="ok";
      if(m.margenReal<0) estado="rojo";
      else if(margenPct<15) estado="ambar";
      return {codigo:p.codigo,cliente:empName(p.cliente_ref),tipo:p.tipo,obj,ingR:m.ingR,egR:m.egR,margen:m.margenReal,margenPct,estado,estadoProy:p.estado};
    }).sort((a,b)=>a.margen-b.margen);
  },
  // aging CxC / CxP por tramo
  aging(tipo){ // 'facturacion' | 'pago'
    const hoy=new Date();
    const tramos={"Por vencer":0,"0-30 vencido":0,"31-60 vencido":0,"+60 vencido":0};
    const hitos=Store.all("hitos").filter(h=>h.tipo===tipo&&!["cobrado","pagado"].includes(h.estado));
    hitos.forEach(h=>{
      const f=h.fechaProg?new Date(h.fechaProg):null; const monto=+h.monto||0;
      if(!f||f>=hoy){ tramos["Por vencer"]+=monto; return; }
      const dd=Math.floor((hoy-f)/864e5);
      if(dd<=30) tramos["0-30 vencido"]+=monto;
      else if(dd<=60) tramos["31-60 vencido"]+=monto;
      else tramos["+60 vencido"]+=monto;
    });
    return tramos;
  },
  // carga operativa por mes (proyectos activos con fecha en el mes)
  cargaOperativa(){
    const map={};
    Store.all("proyectos").forEach(p=>{
      if(!p.fechaIni) return; const d=new Date(p.fechaIni); if(isNaN(d)) return;
      const k=mesNombre(d.getMonth())+" "+String(d.getFullYear()).slice(-2);
      const sk=d.getFullYear()*12+d.getMonth();
      if(!map[k]) map[k]={mes:k,n:0,monto:0,sort:sk};
      map[k].n++; map[k].monto+=+p.montoTotal||0;
    });
    return Object.values(map).sort((a,b)=>a.sort-b.sort);
  },
  // estado de resultados simplificado (real)
  eerr(){
    let ingresos=0,costosDir=0,gastosGen=0;
    Store.all("transacciones").filter(t=>t.real).forEach(t=>{
      if(t.tipo==="ingreso") ingresos+=+t.monto||0;
      else if(t.proyecto_ref) costosDir+=+t.monto||0;
      else gastosGen+=+t.monto||0;
    });
    // egresos de tesorería sin proyecto = gastos generales
    Store.all("mov_tesoreria").filter(m=>m.tipo==="egreso"&&!m.esTransfer).forEach(m=>gastosGen+=+m.monto||0);
    const margenContrib=ingresos-costosDir;
    const resultado=margenContrib-gastosGen;
    return {ingresos,costosDir,margenContrib,gastosGen,resultado,
      margenPct:ingresos>0?margenContrib/ingresos*100:0, resPct:ingresos>0?resultado/ingresos*100:0};
  }
};

/* ---------- COMERCIAL ---------- */

  const emb=Rep.embudo();
  const wr=Rep.winRate(), wrt=Rep.winRatePorTipo();

  const conc=Rep.concentracion();
  const pondTotal=emb.reduce((s,e)=>s+e.monto*e.prob/100,0);

  return `
  ${Rep._card("1 · Embudo de conversión","Propuestas por etapa, su valor y probabilidad. Detecta si pierdes en generación o en cierre.",
    `<div class="funnel">${emb.map(e=>`
      <div class="funnel-row">
        <div class="funnel-label">${e.etapa}</div>
        <div class="funnel-bar"><div class="funnel-fill" style="width:${Math.max(8,e.prob)}%">${e.n}</div></div>
        <div class="funnel-val">${fmt(e.monto)}</div>
      </div>`).join("")}</div>`)}

  ${Rep._card("2 · Pipeline ponderado vs valor total","Pronóstico realista de ventas: valor ajustado por probabilidad de cierre.",
    `<div class="grid g2">
      <div class="mini-stat"><span class="l">Valor total en pipeline</span><span class="v" style="font-size:22px">${fmt(emb.reduce((s,e)=>s+e.monto,0))}</span></div>
      <div class="mini-stat"><span class="l">Ponderado por probabilidad</span><span class="v" style="font-size:22px;color:var(--orange-deep)">${fmt(pondTotal)}</span></div>
    </div>`)}

  ${Rep._card("3 · Win rate por tipo de servicio","Dónde tienes ventaja real y dónde quemas tiempo cotizando.",
    `<div class="grid g2" style="margin-bottom:14px">
      <div class="mini-stat"><span class="l">Win rate global</span><span class="v" style="font-size:22px;color:var(--green)">${fmtPct(wr.rate)}</span><span class="l">${wr.ganadas} ganadas / ${wr.perdidas} perdidas</span></div>
    </div>
    ${wrt.length?`<div class="tbl-wrap" style="border:none"><table><thead><tr><th>Tipo</th><th class="num">Ganadas</th><th class="num">Perdidas</th><th class="num">Win rate</th></tr></thead>

  ${Rep._card("5 · Concentración de cartera","Riesgo estratégico: cuánto dependes de un solo cliente.",

/* =====================================================================
   TESORERÍA — cuentas, posición de caja, proyección, runway
   ===================================================================== */
const Tes = {
  // saldo actual de una cuenta = saldo inicial + movimientos propios reales + transacciones de proyecto reales con cuenta_ref
  saldoCuenta(cid){
    const c=Store.get("cuentas",cid); if(!c) return 0;
    let s=+c.saldoInicial||0;
    Store.all("mov_tesoreria").filter(m=>m.cuenta_ref===cid).forEach(m=>{ s+=(m.tipo==="ingreso"?1:-1)*(+m.monto||0); });
    Store.all("transacciones").filter(t=>t.cuenta_ref===cid && t.real===true).forEach(t=>{ s+=(t.tipo==="ingreso"?1:-1)*(+t.monto||0); });
    return s;
  },
  posicionTotal(){ return Store.all("cuentas").reduce((s,c)=>s+this.saldoCuenta(c.id),0); },
  // quema mensual promedio: egresos reales de los últimos 90 días / 3
  quemaMensual(){
    const desde=new Date(Date.now()-90*864e5);
    let eg=0;
    Store.all("transacciones").filter(t=>t.tipo==="egreso"&&t.real&&new Date(t.fecha)>=desde).forEach(t=>eg+=+t.monto||0);
    Store.all("mov_tesoreria").filter(m=>m.tipo==="egreso"&&new Date(m.fecha)>=desde).forEach(m=>eg+=+m.monto||0);
    return eg/3;
  },
  runwayMeses(){ const q=this.quemaMensual(); return q>0?this.posicionTotal()/q:Infinity; },
  // proyección de caja a N días: saldo hoy + ingresos/egresos proyectados (hitos pendientes + tx proyectadas) por ventana
  proyeccion(){
    const hoy=new Date(); const base=this.posicionTotal();
    const ventanas=[30,60,90];
    const res=ventanas.map(d=>{
      const lim=new Date(hoy.getTime()+d*864e5);
      let ing=0,eg=0;
      // hitos de facturación pendientes (cobro futuro) y de pago pendientes
      Store.all("hitos").forEach(h=>{
        if(!h.fechaProg) return; const f=new Date(h.fechaProg); if(f<hoy||f>lim) return;
        if(h.tipo==="facturacion"&&!["cobrado"].includes(h.estado)) ing+=+h.monto||0;
        if(h.tipo==="pago"&&!["pagado"].includes(h.estado)) eg+=+h.monto||0;
      });
      // transacciones proyectadas (no reales) con fecha en ventana
      Store.all("transacciones").forEach(t=>{
        if(t.real) return; const f=new Date(t.fecha); if(isNaN(f)||f<hoy||f>lim) return;
        if(t.tipo==="ingreso") ing+=+t.monto||0; else eg+=+t.monto||0;
      });
      return {dias:d, ing, eg, saldoProy:base+ing-eg};
    });
    return {base,res};
  }
};

    ${items.length?`<div class="tbl-wrap"><table><thead><tr><th>Fecha</th><th>Concepto</th><th>Origen</th><th class="num">Monto</th><th>Conciliado</th></tr></thead>
      <tbody>${items.map(it=>`<tr>
        <td class="t-mut">${fmtFecha(it.fecha)}</td><td>${esc(it.concepto)}</td>
        <td><span class="chip" style="padding:2px 8px;font-size:11px">${esc(it.origen)}</span></td>
        <td class="num t-strong" style="color:${it.tipo==='ingreso'?'var(--green)':'var(--red)'}">${it.tipo==='ingreso'?'+':'−'}${fmt(it.monto)}</td>
        <td>${Auth.can('write')?`<input type="checkbox" ${it.conc?'checked':''} onchange="Tes.toggleConc('${it.esMov?'mov_tesoreria':'transacciones'}','${it.id}',this.checked)">`:(it.conc?'✓':'—')}</td>
      </tr>`).join("")}</tbody></table></div>`:'<div class="empty" style="padding:30px"><p>Sin movimientos en esta cuenta</p></div>'}`,
    Auth.can('write')?`<button class="btn btn-danger" onclick="Tes.cuentaDel('${id}')">Eliminar cuenta</button>
      <button class="btn btn-ghost" onclick="Tes.cuentaForm('${id}')">Editar</button>
      <button class="btn btn-o" onclick="Tes.movForm(null,'${id}')">+ Movimiento</button>`:'',true);
};
Tes.toggleConc=async function(col,id,val){ const d=Store.get(col,id); if(!d)return; d.conciliado=val; await Store.set(col,d); toast(val?"Conciliado":"Desmarcado","ok"); };
Tes.cuentaDel=async function(id){
  const movs=Store.all("mov_tesoreria").some(m=>m.cuenta_ref===id);
  const txs=Store.all("transacciones").some(t=>t.cuenta_ref===id);
  if(movs||txs){ toast("No se puede: tiene movimientos asociados","err"); return; }
  const ok=await Confirm.ask({title:"Eliminar cuenta",danger:true,message:"¿Eliminar esta cuenta?",detail:"No tiene movimientos asociados."});
  if(!ok) return; await Store.del("cuentas",id); Modal.close(); toast("Eliminada"); Views.tesoreria();
};

/* movimiento propio de tesorería (no de proyecto): gasto general, ingreso, o transferencia */
Tes.movForm=function(_,cuentaPre){
  const cuentas=Store.all("cuentas");
  if(!cuentas.length){ toast("Crea una cuenta primero","err"); return; }
  Modal.open("Movimiento de tesorería",`
    <div class="form-grid">
      <div class="fg"><label>Tipo de movimiento</label>
        <div class="tx-toggle" id="m_tipoTog">
          <button type="button" class="tx-opt active" data-v="ingreso" onclick="Tes._setMovTipo('ingreso')">Ingreso</button>
          <button type="button" class="tx-opt" data-v="egreso" onclick="Tes._setMovTipo('egreso')">Egreso</button>
          <button type="button" class="tx-opt" data-v="transfer" onclick="Tes._setMovTipo('transfer')">Transferencia</button>
        </div>
        <input type="hidden" id="m_tipo" value="ingreso">
      </div>
      <div class="form-row">
        <div class="fg" id="m_ctaBox"><label>Cuenta <span class="req">*</span></label><select id="m_cuenta">${cuentas.map(c=>`<option value="${c.id}" ${cuentaPre===c.id?'selected':''}>${esc(c.nombre)}</option>`).join("")}</select></div>
        <div class="fg" id="m_ctaDestBox" style="display:none"><label>Cuenta destino <span class="req">*</span></label><select id="m_cuentaDest">${cuentas.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join("")}</select></div>
        <div class="fg"><label>Monto <span class="req">*</span></label><input id="m_monto" type="number" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Fecha</label><input id="m_fecha" type="date" value="${todayISO()}"></div>
        <div class="fg"><label>Categoría</label><select id="m_cat"><option value="">— Ninguna —</option>${optCategorias()}</select></div>
      </div>
      <div class="fg"><label>Concepto</label><input id="m_concepto" placeholder="Pago arriendo / Aporte socio / Transferencia interna…"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
     <button class="btn btn-o" onclick="Tes.movSave()">Guardar</button>`);
  setTimeout(()=>document.getElementById('m_monto')?.focus(),80);
};
Tes._setMovTipo=function(v){
  document.getElementById('m_tipo').value=v;
  document.querySelectorAll('#m_tipoTog .tx-opt').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  document.getElementById('m_ctaDestBox').style.display=v==="transfer"?"block":"none";
  document.querySelector('#m_ctaBox label').innerHTML=v==="transfer"?'Cuenta origen <span class="req">*</span>':'Cuenta <span class="req">*</span>';
};
Tes.movSave=async function(){
  const tipo=document.getElementById('m_tipo').value;
  const monto=+document.getElementById('m_monto').value;
  if(!monto){ toast("Monto requerido","err"); return; }
  const cuenta=document.getElementById('m_cuenta').value;
  const fecha=document.getElementById('m_fecha').value;
  const concepto=document.getElementById('m_concepto').value;
  const cat=document.getElementById('m_cat').value||null;
  if(tipo==="transfer"){
    const dest=document.getElementById('m_cuentaDest').value;
    if(cuenta===dest){ toast("Origen y destino deben ser distintos","err"); return; }
    await Store.set("mov_tesoreria",{cuenta_ref:cuenta,tipo:"egreso",monto,fecha,concepto:concepto||"Transferencia a "+((Store.get("cuentas",dest)||{}).nombre||""),categoria_ref:cat,esTransfer:true});
    await Store.set("mov_tesoreria",{cuenta_ref:dest,tipo:"ingreso",monto,fecha,concepto:concepto||"Transferencia desde "+((Store.get("cuentas",cuenta)||{}).nombre||""),categoria_ref:cat,esTransfer:true});
    Modal.close(); toast("Transferencia registrada","ok"); Views.tesoreria(); return;
  }
  await Store.set("mov_tesoreria",{cuenta_ref:cuenta,tipo,monto,fecha,concepto,categoria_ref:cat});
  Modal.close(); toast("Movimiento registrado","ok"); Views.tesoreria();
};

/* =====================================================================
   MIGRADOR — CashFlow legacy → colecciones ERP
   No toca el CashFlow. Lee el JSON exportado y carga en akadem-erp.
   Idempotente: marca registros migrados con _legacyId para no duplicar.
   ===================================================================== */
const Migracion = {
  // mapeo de estados legacy → ERP
  _estProy:{completado:"cerrado",en_ejecucion:"activo",planificado:"activo",en_pausa:"en pausa"},
  _estProp:{borrador:"borrador",enviada:"enviada",negociacion:"negociacion",adjudicada:"adjudicada",perdida:"perdida"},

  parse(raw){
    let data; try{ data=JSON.parse(raw); }catch(e){ return {error:"JSON inválido: "+e.message}; }
    // aceptar tanto el objeto directo como {payload:"..."} o anidado
    if(typeof data.payload==="string"){ try{ data=JSON.parse(data.payload); }catch(e){} }
    const r={
      clientes:data.clientes||[], propuestas:data.propuestas||[], proyectos:data.proyectos||[],
      transacciones:data.transacciones||[], oc:data.oc||[], categorias:(data.categorias||[]).filter(c=>c.tipo==="egreso"),
      personas:data.personas||[], cuentas:data.cuentas||[]
    };
    return r;
  },

  preview(raw){
    const d=this.parse(raw);
    if(d.error) return d;
    // cuántos ya están migrados (por _legacyId)
    const yaEmp=new Set(Store.all("empresas").map(e=>e._legacyId).filter(Boolean));
    const yaProp=new Set(Store.all("propuestas").map(p=>p._legacyId).filter(Boolean));
    const yaProy=new Set(Store.all("proyectos").map(p=>p._legacyId).filter(Boolean));
    const yaTx=new Set(Store.all("transacciones").map(t=>t._legacyId).filter(Boolean));
    const yaOc=new Set(Store.all("ordenes_compra").map(o=>o._legacyId).filter(Boolean));
    const yaCat=new Set(Store.all("categorias_egreso").map(c=>c._legacyNombre).filter(Boolean));
    return {
      data:d,
      counts:{
        empresas:{total:d.clientes.length, nuevos:d.clientes.filter(c=>!yaEmp.has("cli_"+c.id)).length},
        propuestas:{total:d.propuestas.length, nuevos:d.propuestas.filter(p=>!yaProp.has("prop_"+p.id)).length},
        proyectos:{total:d.proyectos.length, nuevos:d.proyectos.filter(p=>!yaProy.has("proy_"+p.id)).length},
        transacciones:{total:d.transacciones.length, nuevos:d.transacciones.filter(t=>!yaTx.has("tx_"+t.id)).length},
        oc:{total:d.oc.length, nuevos:d.oc.filter(o=>!yaOc.has("oc_"+o.id)).length},
        categorias:{total:d.categorias.length, nuevos:d.categorias.filter(c=>!yaCat.has(c.nombre)).length},
        personas:{total:d.personas.length, nuevos:d.personas.length},
        cuentas:{total:d.cuentas.length, nuevos:d.cuentas.filter(c=>!new Set(Store.all("cuentas").map(x=>x._legacyId)).has("cta_"+c.id)).length}
      }
    };
  },

  async run(raw){
    const d=this.parse(raw);
    if(d.error){ toast(d.error,"err"); return; }
    const log={empresas:0,propuestas:0,proyectos:0,centros:0,transacciones:0,oc:0,categorias:0,personas:0,cuentas:0};
    const mapCta={};

    // índices legacyId → nuevo id
    const mapEmp={}, mapProy={};

    // pre-cargar lo ya migrado para revincular aunque sea 2da corrida
    Store.all("empresas").forEach(e=>{ if(e._legacyId&&e._legacyId.startsWith("cli_")) mapEmp[e._legacyId.slice(4)]=e.id; });
    Store.all("proyectos").forEach(p=>{ if(p._legacyId&&p._legacyId.startsWith("proy_")) mapProy[p._legacyId.slice(5)]=p.id; });

    // 1) CATEGORÍAS DE EGRESO
    const catExist=new Set(Store.all("categorias_egreso").map(c=>c.nombre));
    for(const c of d.categorias){
      if(catExist.has(c.nombre)) continue;
      await Store.set("categorias_egreso",{nombre:c.nombre,_legacyNombre:c.nombre}); log.categorias++;
    }

    // 2) EMPRESAS (clientes)
    for(const c of d.clientes){
      const lid="cli_"+c.id;
      const ex=Store.all("empresas").find(e=>e._legacyId===lid);
      if(ex){ mapEmp[c.id]=ex.id; continue; }
      const e=await Store.set("empresas",{
        razon:c.nombre, rut:c.rut?cleanRut(c.rut):"", tipo:"cliente",
        giro:"", contacto:[c.contacto,c.email].filter(Boolean).join(" · "),
        condPago:c.diasPago?c.diasPago+" días":"", datosFact:c.tipo?("Sector: "+c.tipo):"",
        _legacyId:lid });
      mapEmp[c.id]=e.id; log.empresas++;
    }

    // 3) PERSONAS
    for(const pe of d.personas){
      const lid="per_"+pe.id;
      if(Store.all("personas").some(x=>x._legacyId===lid)) continue;
      await Store.set("personas",{nombre:pe.nombre||pe.nombreCompleto||"—",rut:pe.rut?cleanRut(pe.rut):"",
        tipoP:pe.tipo||"freelancer",email:pe.email||"",tarifa:+pe.tarifa||0,
        banco:pe.banco||"",tCuenta:pe.tipoCuenta||"",nCuenta:pe.numCuenta||"",_legacyId:lid}); log.personas++;
    }

    // 4) PROPUESTAS
    for(const p of d.propuestas){
      const lid="prop_"+p.id;
      if(Store.all("propuestas").some(x=>x._legacyId===lid)) continue;
      await Store.set("propuestas",{
        cliente_ref:mapEmp[p.clienteId]||null, tipo:p.tipo||"GEST", titulo:p.nombre||p.desc||"",
        monto:+p.monto||0, estado:this._estProp[p.estado]||"enviada",
        fechaCierre:p.vence||p.fecha||"", responsable:"", notas:p.desc||"",
        historial:[{fecha:p.creado||nowISO(),txt:"Migrada desde CashFlow",user:"migracion"}],
        _legacyId:lid });
      log.propuestas++;
    }

    // 5) PROYECTOS + centros de costo
    for(const p of d.proyectos){
      const lid="proy_"+p.id;
      let proyId=mapProy[p.id];
      if(!proyId){
        const cc=await Store.set("centros_costo",{nombre:"CC "+(p.codigo||p.id),_legacyId:"cc_"+p.id}); log.centros++;
        const proy=await Store.set("proyectos",{
          codigo:p.codigo||("AKD-LEG-"+p.id), cliente_ref:mapEmp[p.clienteId]||null, tipo:p.tipo||"GEST",
          titulo:p.nombre||p.desc||"", centro_costo_ref:cc.id, montoTotal:+p.presupuesto||0,
          estado:this._estProy[p.estado]||"activo", condiciones:p.desc||"",
          fechaIni:p.inicio||"", fechaFin:p.cierre||"",
          _legacyId:lid, _legacyIngresos:+p.ingresos||0, _legacyGastado:+p.gastado||0 });
        cc.proyecto_ref=proy.id; await Store.set("centros_costo",cc);
        proyId=proy.id; mapProy[p.id]=proyId; log.proyectos++;
      }
    }

    // 6) OC
    for(const o of d.oc){
      const lid="oc_"+o.id;
      if(Store.all("ordenes_compra").some(x=>x._legacyId===lid)) continue;
      const proyId=mapProy[o.proyectoId]||null;
      const oc=await Store.set("ordenes_compra",{
        proyecto_ref:proyId, numero:o.numero||"", emisor:o.clienteNom||"", monto:+o.monto||0,
        fecha:o.fecha||"", _legacyId:lid, _archivo:o.archivo||"", _estado:o.estado||"" });
      if(proyId){ const pr=Store.get("proyectos",proyId); if(pr&&!pr.OC_ref){ pr.OC_ref=oc.id; await Store.set("proyectos",pr); } }
      log.oc++;
    }

    // 6.5) CUENTAS (tesorería) — la cuenta Mercado Pago ahora tiene destino
    for(const ct of d.cuentas){
      const lid="cta_"+ct.id;
      const ex=Store.all("cuentas").find(x=>x._legacyId===lid);
      if(ex){ mapCta[ct.id]=ex.id; continue; }
      const nueva=await Store.set("cuentas",{
        nombre:ct.nombre||"Cuenta", tipo:ct.tipo||"Cuenta Vista", banco:ct.banco||"",
        num:ct.num||"", saldoInicial:+ct.saldo||0, _legacyId:lid });
      mapCta[ct.id]=nueva.id; log.cuentas++;
    }

    // 7) TRANSACCIONES
    for(const t of d.transacciones){
      const lid="tx_"+t.id;
      if(Store.all("transacciones").some(x=>x._legacyId===lid)) continue;
      const proyId=mapProy[t.proyectoId]||null;
      const real=t.estado==="real";
      await Store.set("transacciones",{
        proyecto_ref:proyId, centro_costo_ref:proyId?(Store.get("proyectos",proyId)||{}).centro_costo_ref:null,
        tipo:t.tipo==="ingreso"?"ingreso":"egreso", real, monto:+t.monto||0,
        fecha:t.fecha||"", concepto:t.concepto||"",
        empresa_ref:(t.tipo==="ingreso"&&mapEmp[t.contraId])?mapEmp[t.contraId]:null,
        persona_ref:null,
        categoria_ref:null,
        cuenta_ref:(t.cuentaId&&mapCta[t.cuentaId])?mapCta[t.cuentaId]:null,
        _legacyId:lid, _legacyEstado:t.estado||"" });
      log.transacciones++;
    }

    Store._cacheToLS();
    return log;
  }
};
